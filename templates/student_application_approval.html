<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Application Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</head>

<body>

    <div class="container mt-4">

        <div class="card p-4">
            <h4>Student Application Details</h4>
            <hr>

            <p><strong>Name:</strong> {{ app.student.name }}</p>
            <p><strong>Drive:</strong> {{ app.drive.drive_name }}</p>
            <p><strong>Company:</strong> {{ app.drive.companies.name }}</p>
            <p><strong>Job Title:</strong> {{ app.drive.job_title }}</p>
            <p><strong>Salary:</strong> {{ app.drive.salary }}</p>
            <p><strong>Location:</strong> {{ app.drive.location }}</p>
            <p><strong>Current Status:</strong>
                <span class="badge bg-info text-dark">{{ app.status }}</span>
            </p>



            <form action="/update_application/{{ app.id }}" method="POST">

                <div class="d-flex gap-2 mt-3">

                    <a class="btn btn-primary" href="/view_applications/{{ app.drive_id }}">Back</a>

                    <div class="dropdown">
                        <button class="btn btn-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown">
                            Status
                        </button>

                        <ul class="dropdown-menu">
                            <li>
                                <button class="dropdown-item" type="submit" name="status" value="Shortlisted">
                                    Shortlist
                                </button>
                            </li>
                            <li>
                                <button class="dropdown-item" type="submit" name="status" value="Pending">
                                    Waiting
                                </button>
                            </li>
                            <li>
                                <button class="dropdown-item" type="submit" name="status" value="Rejected">
                                    Reject
                                </button>
                            </li>
                        </ul>
                    </div>

                </div>

            </form>




        </div>

    </div>
</body>

</html>
