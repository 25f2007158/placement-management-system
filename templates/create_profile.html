<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="container mt-5" style="max-width: 700px;">

        <div class="card p-4">
            <h3>Profile Info</h3>


            <form action="/create_profile" method="POST">

                <div class="mb-3">
                    <label class="form-label">Name</label>
                    <input type="text" class="form-control" name="name" placeholder="Name" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Department</label>
                    <input type="text" class="form-control" name="department" placeholder="department" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Skills</label>
                    <input type="text" class="form-control" name="skills" placeholder="skills" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Projects</label>
                    <input type="text" class="form-control" name="projects" placeholder="projects" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Experience</label>
                    <input type="number" class="form-control" name="experience" placeholder="experience" required>
                </div>



                <div class="text-center">
                    <button type="submit" class="btn btn-primary">
                        Save
                    </button>
                </div>

            </form>

        </div>
    </div>
</body>

</html>
