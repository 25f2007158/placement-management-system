<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Company Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-7">
                <div class="card shadow">
                    <div class="card-header bg-dark text-white text-center">
                        <h3>Company Profile Setup</h3>
                    </div>
                    <div class="card-body p-4">
                        <form action="/create_company_profile" method="POST">

                            <div class="mb-3">
                                <label class="form-label font-weight-bold">Company Name</label>
                                <input type="text" name="name" class="form-control"
                                    placeholder="Enter Official Company Name" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label font-weight-bold">Company Description</label>
                                <textarea name="description" class="form-control" rows="6"
                                    required>We are excited to offer you an opportunity to be a part of our organization. Explore the role, review the requirements, and apply if your skills and interests align with what we’re looking for.</textarea>
                                <small class="text-muted">You can customize this message for students to see.</small>
                            </div>

                            <div class="d-grid mt-4">
                                <button type="submit" class="btn btn-success btn-lg">Save Profile</button>
                            </div>

                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
