<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Company_details</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <link rel="stylesheet" href="/static/style.css">
    <style>
        #canvas {
            border: 2px solid black;
            height: 1050px;
            width: 60%;
            margin: auto;
        }
    </style>

</head>

<body>
    <div id="main">
        <!-- this is for the main page -->
        <div id="canvas">
            <!-- this is for better visibility (will have space on right and left side of the page ) -->
            <nav class="navbar navbar-expand-lg bg-body-tertiary">
                <div class="container-fluid">
                    <a class="navbar-brand" href="#">{{company.name}}</a>
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                        data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                        aria-expanded="false" aria-label="Toggle navigation">
                        <span class="navbar-toggler-icon"></span>
                    </button>

                <!-- Right Side -->
                <div class="ms-auto">
                    <a href="/student_application_history" class="btn btn-outline-secondary btn-sm me-2">
                        History
                    </a>
                    <a href="/login" class="btn btn-outline-danger btn-sm">
                        Logout
                    </a>
                </div>

            </nav>
            <br>
            <h3>Overview</h3>
            <p>
                <!-- We are excited to offer you an opportunity to be a part of our organization. Explore the role, review the requirements, and apply if your skills and interests align with what we’re looking for. -->
               {{company.description}}
            </p>
            <br>

            <h3>Current Drives</h3>
            {%for d in drive%}
            <div class="card">

                <div class="card">
                    <div class="card-body d-flex align-items-center">
                        <span>{{d.drive_name}}</span>
                        <a class="btn btn-primary px-5 ms-auto" href="/apply_to_drive/{{ d.id }}">View Details</a>
                    </div>
                </div>
                
            </div>
            {%endfor%}
            



        </div>
    </div>

</body>

</html>
