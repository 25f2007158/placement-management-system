<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Application</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <link rel="stylesheet" href="/static/style.css">
    <style>
        #canvas {
            border: 2px solid black;
            height: 1050px;
            width: 60%;
            margin: auto;
        }
    </style>

</head>

<body>
    <div id="main">
        <!-- this is for the main page -->
        <div id="canvas">

            <div id="content">
                <br>
                <div>
                    <h3>Applications for {{ drive.drive_name }}</h3>
                    <h5>Job Title: {{ drive.job_title }}</h5>
                    <br>
                    <h5>Received Applications</h5>
                </div>
                {% for app in applications %}
                <div class="card">
                    <div class="card-body d-flex align-items-center">
                        <span>{{ app.student.name }}</span>
                        <a class="btn btn-primary px-5 ms-auto" href="/review_application/{{ app.id }}">Review
                            application</a>
                    </div>
                </div>
                {% endfor %}
                <div class="d-flex justify-content-center mt-4">
                    <a href="/company" class="btn btn-outline-light px-5">
                        Back to Dashboard
                    </a>
                </div>



            </div>
        </div>

</body>

</html>
