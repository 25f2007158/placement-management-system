<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Drive</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="container mt-5" style="max-width: 700px;">

        <div class="card p-4">
            <h3>Create a Drive</h3>


            <form action="/create_drive" method="POST">

                <div class="mb-3">
                    <label class="form-label">Drive Name</label>
                    <input type="text" class="form-control" name="drive_name" placeholder="Enter Drive name" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Job Title</label>
                    <input type="text" class="form-control" name="job_title" placeholder="Enter Job Title" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Job Description</label>
                    <textarea class="form-control" name="job_description" rows="4"
                        placeholder="Write your Job Description...." required></textarea>
                </div>

                <div class="mb-3">
                    <label class="form-label">Eligibility Criteria</label>
                    <input type="text" class="form-control" name="eligibility" placeholder="Enter Eligibility Criteria"
                        required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Salary</label>
                    <input type="number" class="form-control" name="salary" placeholder="Enter Salary" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Location</label>
                    <input type="text" class="form-control" name="location" placeholder="Enter Location" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Application Deadline</label>
                    <input type="date" class="form-control" name="deadline" required>
                </div>
                <div class="mb-3">
                    <label class="form-label font-weight-bold">Drive Status</label>
                    <select name="status" class="form-select" required>
                        <option value="open" selected>Open (Visible & Accept Applications)</option>
                        <option value="upcoming">Upcoming (Preview Only)</option>
                        <option value="closed">Closed (Archive)</option>
                    </select>
                    <small class="text-muted">Choose 'Open' if you want students to apply immediately.</small>
                </div>

                <div class="text-center">
                    <button type="submit" class="btn btn-primary">
                        Create Drive
                    </button>
                </div>

            </form>

        </div>
    </div>
</body>

</html>
